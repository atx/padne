name: Build Documentation

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_docs:
    name: "Build Sphinx docs"
    runs-on: ubuntu-24.04
    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        # Polyversion enumerates refs from the local repo; needs full history + tags.
        fetch-depth: 0

    - name: Setup Padne
      uses: ./.github/actions/setup-padne

    - name: Install documentation dependencies
      run: |
        pip3 install --break-system-packages --user -e .[docs]

    - name: Build multi-version documentation
      run: |
        make -C docs polyversion

    - name: Upload documentation artifact
      uses: actions/upload-artifact@v4
      with:
        name: padne-docs
        path: docs/_build/polyversion
        retention-days: 90
