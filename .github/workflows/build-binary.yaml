name: Build Binary

on:
  workflow_call: # Allow this workflow to be called by other workflows
    inputs:
      retention_days:
        type: number
        default: 30
        description: "Artifact retention period in days"
    outputs:
      artifact_name:
        description: "Name of the uploaded binary artifact"
        value: ${{ jobs.build.outputs.artifact_name }}

permissions:
  contents: read

jobs:
  build:
    name: "Build PyInstaller Binary"
    runs-on: ubuntu-24.04
    outputs:
      artifact_name: ${{ steps.set_artifact_name.outputs.name }}
    steps:
      - name: Set artifact name
        id: set_artifact_name
        run: |
          echo "name=padne-linux-x64-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Padne dependencies
        uses: ./.github/actions/setup-padne
        with:
          kicad-version: '10.0'

      - name: Install PyInstaller
        run: |
          pip3 install --break-system-packages --user pyinstaller

      - name: Create binary with PyInstaller
        run: |
          pyinstaller --clean --noconfirm padne.spec

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set_artifact_name.outputs.name }}
          path: dist/padne
          retention-days: ${{ inputs.retention_days }}

  test:
    name: "Test Binary"
    needs: build
    runs-on: ubuntu-24.04
    # Pristine container without KiCad, Qt or Python installed, to verify
    # that the binary is actually self-contained
    container:
      image: ubuntu:24.04
    steps:
      # The libraries are the display-stack runtime deps that PyInstaller
      # deliberately does not bundle; any desktop system has them.
      - name: Install node and minimal runtime libraries
        run: |
          apt-get update
          apt-get install -y libxcb1 libgtk-3-0t64 libgl1 libopengl0 libegl1

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}

      - name: Run padne solve on a test project
        run: |
          chmod +x ./padne
          ./padne --version
          ./padne solve tests/kicad/ldo/ldo.kicad_pro solution.pickle
          ./padne paraview solution.pickle paraview_out
          ls -l paraview_out
