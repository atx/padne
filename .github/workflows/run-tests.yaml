name: Run Tests

on: [push, pull_request]
permissions:
  checks: write
  contents: read

jobs:
  build_and_test:
    name: "Run Tests (KiCad ${{ matrix.kicad-version }})"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        kicad-version: ['9.0', '10.0']
    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Padne
      uses: ./.github/actions/setup-padne
      with:
        kicad-version: ${{ matrix.kicad-version }}

    - name: Run tests with pytest and generate report
      run: |
        python3 -m pytest --junitxml=pytest-results.xml

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always() # Always run this step to publish results, even if tests fail
      with:
        name: Pytest Results (KiCad ${{ matrix.kicad-version }})
        path: pytest-results.xml
        reporter: java-junit
        fail-on-error: 'true'
        badge-title: 'Tests (KiCad ${{ matrix.kicad-version }})'
